services:
  - type: web
    name: cafecampus-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && node src/prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
